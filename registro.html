<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow — Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #080c12; color: #c8d8e8; font-family: monospace; }
        .card { background: #131d2e; border: 1px solid #1e2d45; border-radius: 20px; }
        .input { width: 100%; background: #080c12; border: 1px solid #1e2d45; border-radius: 10px; padding: 10px; color: white; margin-bottom: 15px; }
        .btn { width: 100%; background: #00d4ff; color: #080c12; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="card w-full max-w-md p-8">
        <h1 class="text-2xl mb-6">Crear cuenta nueva</h1>
        <div id="msg" class="hidden p-3 mb-4 rounded text-sm"></div>
        <form id="reg-form">
            <label class="text-xs text-gray-500">CORREO ELECTRÓNICO</label>
            <input id="email" type="email" class="input" placeholder="tu@correo.com" required>
            <label class="text-xs text-gray-500">CONTRASEÑA</label>
            <input id="pass" type="password" class="input" placeholder="••••••••" required>
            <button type="submit" class="btn">Registrarse ahora</button>
        </form>
        <p class="text-center mt-4 text-xs">
            <a href="index.html" class="text-cyan-400">¿Ya tienes cuenta? Inicia sesión</a>
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://smrttvjrivnsunuhtoah.supabase.co';
        const SUPABASE_KEY = 'TeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtcnR0dmpyaXZuc3VudWh0b2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTk0MzYsImV4cCI6MjA5MzU5NTQzNn0.schbQxr0xKPZ7G6DZK8a_ewWQAKDUJIWKHre2YGPPQg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const msg = document.getElementById('msg');

            const { data, error } = await supabaseClient.auth.signUp({ email, password });

            msg.classList.remove('hidden');
            if (error) {
                msg.textContent = error.message;
                msg.style.backgroundColor = 'rgba(255,0,0,0.1)';
            } else {
                msg.textContent = '¡Registro exitoso! Revisa tu correo para confirmar.';
                msg.style.backgroundColor = 'rgba(0,255,0,0.1)';
            }
        });
    </script>
</body>
</html>
