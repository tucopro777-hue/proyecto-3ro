<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow — Acceso</title>

  <!-- Tailwind CSS vía CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS Client vía CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts: DM Serif Display + DM Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    /* ─── Tailwind: paleta y tipografía personalizadas ─── */
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Serif Display"', 'serif'],
            mono:    ['"DM Mono"', 'monospace'],
          },
          colors: {
            canvas:  '#080c12',
            surface: '#0f1520',
            card:    '#131d2e',
            border:  '#1e2d45',
            accent:  '#00d4ff',
            'accent-dim': '#0099bb',
            muted:   '#4a6080',
            text:    '#c8d8e8',
          },
          boxShadow: {
            'glow-accent': '0 0 30px 0 rgba(0,212,255,0.15)',
            'glow-btn':    '0 0 20px 0 rgba(0,212,255,0.3)',
          },
        }
      }
    };
  </script>

  <style>
    /* ─── Variables & base ─── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background-color: #080c12;
      color: #c8d8e8;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Rejilla de fondo (grid lines) ─── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Blob de luz ambiental ─── */
    .ambient-blob {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .ambient-blob-2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,80,200,0.05) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
      z-index: 0;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* ─── Card del formulario ─── */
    .login-card {
      background: linear-gradient(145deg, #131d2e 0%, #0f1520 100%);
      border: 1px solid #1e2d45;
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.05),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Inputs ─── */
    .ff-input {
      width: 100%;
      background: #080c12;
      border: 1px solid #1e2d45;
      border-radius: 10px;
      color: #c8d8e8;
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ff-input::placeholder { color: #4a6080; }
    .ff-input:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    /* ─── Botón primario ─── */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #00d4ff 0%, #0099bb 100%);
      color: #080c12;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .btn-primary:active { transform: translateY(0); opacity: 1; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ─── Botón secundario (registro) ─── */
    .btn-secondary {
      width: 100%;
      background: transparent;
      color: #00d4ff;
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      letter-spacing: 0.03em;
      padding: 0.75rem 1.5rem;
      border: 1px solid #1e2d45;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-secondary:hover {
      background: rgba(0,212,255,0.06);
      border-color: rgba(0,212,255,0.35);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0); }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #4a6080;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e2d45;
    }

    /* ─── Badge del logo ─── */
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #00d4ff, #0055a4);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 18px rgba(0,212,255,0.25);
    }

    /* ─── Alerta de error / éxito ─── */
    .alert {
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      display: none;
    }
    .alert.visible { display: block; animation: fadeIn 0.25s ease; }
    .alert-error   { background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.25); color: #ff6b6b; }
    .alert-success { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.25); color: #00d4ff; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Spinner en botón ─── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(8,12,18,0.3);
      border-top-color: #080c12;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Label flotante ─── */
    .field-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a6080;
      margin-bottom: 0.4rem;
    }
    .field-label span { color: #00d4ff; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 py-10 relative">

  <!-- Decoración de fondo -->
  <div class="bg-grid"></div>
  <div class="ambient-blob"></div>
  <div class="ambient-blob-2"></div>

  <!-- ───────────────────────────────────────────
       TARJETA PRINCIPAL
  ─────────────────────────────────────────── -->
  <div class="login-card w-full max-w-md p-8 relative z-10">

    <!-- Logo + marca -->
    <div class="mb-8">
      <div class="logo-badge mb-4">
        <div class="logo-icon">💹</div>
        <span class="font-display text-2xl text-text tracking-tight">FinFlow</span>
      </div>
      <p class="text-xs text-muted tracking-widest uppercase">Control financiero inteligente</p>
    </div>

    <!-- Título de sección -->
    <h1 class="font-display text-3xl text-text mb-1">Bienvenido de nuevo</h1>
    <p class="text-sm text-muted mb-7">Accede a tu dashboard personal</p>

    <!-- Alerta (error / éxito) -->
    <div id="alert-box" class="alert mb-5" role="alert"></div>

    <!-- ─── FORMULARIO DE LOGIN ─── -->
    <form id="login-form" novalidate>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="field-label">Correo electrónico <span>*</span></label>
        <input
          id="email"
          type="email"
          class="ff-input"
          placeholder="tu@correo.com"
          autocomplete="email"
          required
        />
      </div>

      <!-- Contraseña -->
      <div class="mb-2">
        <label for="password" class="field-label">Contraseña <span>*</span></label>
        <div class="relative">
          <input
            id="password"
            type="password"
            class="ff-input pr-12"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <!-- Botón mostrar/ocultar contraseña -->
          <button
            type="button"
            id="toggle-password"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-accent transition-colors text-xs tracking-wide"
            aria-label="Mostrar contraseña"
          >VER</button>
        </div>
      </div>

      <!-- ¿Olvidaste tu contraseña? -->
      <div class="flex justify-end mb-6">
        <button
          type="button"
          id="btn-forgot"
          class="text-xs text-muted hover:text-accent transition-colors tracking-wide"
        >¿Olvidaste tu contraseña?</button>
      </div>

      <!-- Botón de acceso -->
      <button type="submit" id="btn-login" class="btn-primary mb-4">
        Iniciar sesión
      </button>

    </form>

    <!-- Divisor -->
    <div class="divider my-5">O</div>

    <!-- Botón de registro -->
    <button type="button" id="btn-register" class="btn-secondary">
      Crear cuenta nueva
    </button>

    <!-- Footer legal -->
    <p class="text-center text-xs text-muted mt-8 leading-relaxed">
      Al acceder, aceptas nuestros
      <a href="#" class="text-accent hover:underline">Términos de uso</a>
      y
      <a href="#" class="text-accent hover:underline">Política de privacidad</a>.
    </p>

  </div>
  <!-- /TARJETA -->


  <!-- ═══════════════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════════════ -->
  <script>
    /* ──────────────────────────────────────────
       1. CONFIGURACIÓN DE SUPABASE
    ────────────────────────────────────────── */
    const SUPABASE_URL      = 'https://smrttvjrivnsunuhtoah.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtcnR0dmpyaXZuc3VudWh0b2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTk0MzYsImV4cCI6MjA5MzU5NTQzNn0.schbQxr0xKPZ7G6DZK8a_ewWQAKDUJIWKHre2YGPPQg';

    // Inicializa el cliente de Supabase usando la variable global inyectada por el CDN
    const { createClient } = supabase;
    const supabaseClient   = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


    /* ──────────────────────────────────────────
       2. UTILIDADES UI
    ────────────────────────────────────────── */

    /** Muestra un mensaje en la caja de alerta */
    function showAlert(message, type = 'error') {
      const box = document.getElementById('alert-box');
      box.textContent = message;
      box.className = `alert visible alert-${type}`;
    }

    /** Oculta la alerta */
    function hideAlert() {
      const box = document.getElementById('alert-box');
      box.className = 'alert';
    }

    /** Activa/desactiva el estado de carga en el botón de login */
    function setLoading(isLoading) {
      const btn = document.getElementById('btn-login');
      btn.disabled = isLoading;
      btn.innerHTML = isLoading
        ? '<span class="spinner"></span> Verificando…'
        : 'Iniciar sesión';
    }


    /* ──────────────────────────────────────────
       3. MOSTRAR / OCULTAR CONTRASEÑA
    ────────────────────────────────────────── */
    document.getElementById('toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type    = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? 'OC.' : 'VER';
    });


    /* ──────────────────────────────────────────
       4. LOGIN CON EMAIL Y CONTRASEÑA
    ────────────────────────────────────────── */
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideAlert();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validación básica en el cliente
      if (!email || !password) {
        showAlert('Por favor, completa todos los campos.');
        return;
      }

      setLoading(true);

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) throw error;

        // ✅ Login exitoso
        showAlert('¡Acceso correcto! Redirigiendo…', 'success');

        // TODO: redirige al dashboard tras el login exitoso
        // setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);

      } catch (err) {
        // Traduce los errores más comunes de Supabase al español
        const messages = {
          'Invalid login credentials':    'Correo o contraseña incorrectos.',
          'Email not confirmed':          'Confirma tu correo antes de ingresar.',
          'Too many requests':            'Demasiados intentos. Espera un momento.',
        };
        const msg = messages[err.message] || 'Ocurrió un error. Inténtalo de nuevo.';
        showAlert(msg);
      } finally {
        setLoading(false);
      }
    });


    /* ──────────────────────────────────────────
       5. RECUPERAR CONTRASEÑA
    ────────────────────────────────────────── */
    document.getElementById('btn-forgot').addEventListener('click', async function () {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        showAlert('Escribe tu correo en el campo de arriba para recuperar tu contraseña.');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/reset-password.html`, // ajusta la ruta
        });

        if (error) throw error;

        showAlert('📧 Te enviamos un enlace de recuperación. Revisa tu bandeja de entrada.', 'success');

      } catch (err) {
        showAlert('No pudimos enviar el correo. Verifica la dirección.');
      }
    });


    /* ──────────────────────────────────────────
       6. BOTÓN DE REGISTRO
       TODO: reemplaza la redirección por la URL
             de tu página de registro, o abre un
             modal personalizado.
    ────────────────────────────────────────── */
    document.getElementById('btn-register').addEventListener('click', function () {
      // window.location.href = '/register.html';
      showAlert('👋 Pronto podrás crear tu cuenta desde aquí.', 'success');
    });


    /* ──────────────────────────────────────────
       7. VERIFICAR SESIÓN ACTIVA
       Si el usuario ya está logueado, redirige.
    ────────────────────────────────────────── */
    (async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        // TODO: redirige si ya hay sesión activa
        // window.location.href = '/dashboard.html';
        console.log('[FinFlow] Sesión activa detectada:', session.user.email);
      }
    })();

  </script>

</body>
</html>
